<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Desk - Deepbloe CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f7f5f0; --surface: #ffffff; --border: #e2ddd6; --border-dark: #c8c2b8;
  --accent: #1a1a1a; --red: #c0392b; --green: #1a6b3c; --blue: #1a3a6b;
  --amber: #8b5e00; --text: #1a1a1a; --muted: #8a8278;
  --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; }

/* ── HEADER ── */
.td-topbar {
  background: var(--accent); padding: 0 28px; display: flex; align-items: center;
  height: 48px; gap: 20px; position: sticky; top: 0; z-index: 50;
}
.td-back {
  background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);
  padding: 5px 12px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 6px;
}
.td-back:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
.td-brand { font-family: var(--mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
.td-brand strong { color: #fff; }
.td-topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.td-user { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.3); }

/* ── HERO ── */
.td-hero {
  background: var(--accent); padding: 20px 28px; border-bottom: 1px solid #333;
}
.td-hero-top { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.td-artist { font-size: 22px; font-weight: 300; color: #fff; }
.td-venue-line { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.td-venue-line strong { color: rgba(255,255,255,0.8); }
.td-hero-stats { display: flex; gap: 16px; }
.td-stat { text-align: center; }
.td-stat-num { font-family: var(--mono); font-size: 20px; color: #fff; }
.td-stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

/* ── BODY ── */
.td-body { padding: 24px 28px; max-width: 1400px; }

/* ── TABS ── */
.td-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.td-tab {
  padding: 10px 20px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.td-tab:hover { color: var(--accent); }
.td-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.td-tab-count {
  font-family: var(--mono); font-size: 9px; background: var(--bg); border: 1px solid var(--border);
  padding: 1px 6px; min-width: 18px; text-align: center;
}

/* ── CARD ── */
.td-card {
  background: var(--surface); border: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.td-card-hdr {
  background: var(--accent); padding: 9px 14px;
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.td-card-title {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
}
.td-card-body { padding: 14px; flex: 1; }
.td-card-actions {
  padding: 10px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; flex-wrap: wrap;
}

/* ── TRAVEL ITEM ROW ── */
.ti-row {
  display: grid; grid-template-columns: 32px 1fr 140px 100px 90px 80px 60px;
  gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border);
  align-items: center; font-size: 12px; transition: background 0.1s;
}
.ti-row:hover { background: #faf8f4; }
.ti-row:last-child { border-bottom: none; }
.ti-row-hdr {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 14px;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.ti-row-hdr:hover { background: var(--bg); }
.ti-icon { font-size: 18px; text-align: center; }
.ti-main { min-width: 0; }
.ti-title { font-family: var(--mono); font-size: 11px; font-weight: 500; }
.ti-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
.ti-date { font-family: var(--mono); font-size: 10px; color: var(--accent); }
.ti-cost { font-family: var(--mono); font-size: 11px; text-align: right; }

/* ── BADGES ── */
.ti-badge {
  font-family: var(--mono); font-size: 9px; padding: 2px 8px; border: 1px solid;
  text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
}
.ti-badge-pending   { color: var(--amber); border-color: var(--amber); }
.ti-badge-booked    { color: var(--blue); border-color: var(--blue); }
.ti-badge-confirmed { color: var(--green); border-color: var(--green); }
.ti-badge-cancelled { color: var(--red); border-color: var(--red); }

/* ── BUTTONS ── */
.td-btn {
  padding: 5px 10px; font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
  text-transform: uppercase; border: 1px solid var(--border-dark); background: none;
  color: var(--muted); cursor: pointer; transition: all 0.1s; white-space: nowrap;
}
.td-btn:hover { border-color: var(--accent); color: var(--accent); }
.td-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
.td-btn.primary:hover { background: #333; }
.td-btn.green { border-color: var(--green); color: var(--green); }
.td-btn.red   { border-color: var(--red); color: var(--red); }
.td-btn.blue  { border-color: var(--blue); color: var(--blue); }

/* ── FORM ── */
.td-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.td-form-wide { grid-column: 1 / -1; }
.td-field { display: flex; flex-direction: column; gap: 4px; }
.td-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.td-input {
  border: 1px solid var(--border-dark); padding: 8px 10px; font-family: var(--sans);
  font-size: 12px; outline: none; background: var(--bg);
}
.td-input:focus { border-color: var(--accent); }
select.td-input { cursor: pointer; }
textarea.td-input { resize: vertical; min-height: 50px; }

/* ── MODAL ── */
.td-modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
  display: none; align-items: flex-start; justify-content: center; padding-top: 60px;
  overflow-y: auto;
}
.td-modal-bg.open { display: flex; }
.td-modal {
  background: #fff; width: 600px; max-width: 96vw; border-top: 3px solid var(--accent);
  margin-bottom: 60px;
}
.td-modal-hdr {
  background: var(--accent); padding: 12px 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.td-modal-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
  text-transform: uppercase; color: rgba(255,255,255,0.6);
}
.td-modal-close {
  background: none; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.5);
  padding: 3px 10px; font-size: 14px; cursor: pointer;
}
.td-modal-close:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
.td-modal-body { padding: 20px; }
.td-modal-foot {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ── EMPTY STATE ── */
.td-empty {
  text-align: center; padding: 40px; font-family: var(--mono); font-size: 11px; color: var(--muted);
}
.td-empty-icon { font-size: 32px; margin-bottom: 12px; }

/* Toast */
#toast { position:fixed; bottom:24px; right:24px; padding:10px 18px; font-family:var(--mono); font-size:11px;
         display:none; z-index:999; }
#toast.success { background:var(--green); color:#fff; }
#toast.error   { background:var(--red); color:#fff; }
#toast.info    { background:var(--accent); color:#fff; }

/* ── EMBEDDED ── */
.embedded #login-screen { display: none !important; }
.embedded .td-topbar { height: 36px; padding: 0 16px; }
.embedded .td-brand { display: none; }
.embedded .td-user { display: none; }

/* ── TIMELINE VIEW ── */
.tl-day { margin-bottom: 16px; }
.tl-day-header {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); padding: 8px 0;
  border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.tl-item {
  display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f0ece6;
}
.tl-time {
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  min-width: 50px; padding-top: 2px;
}
.tl-content { flex: 1; }
.tl-content-title { font-size: 12px; font-weight: 500; }
.tl-content-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── SUMMARY CARDS ── */
.td-summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.td-summary-card {
  background: var(--surface); border: 1px solid var(--border); padding: 14px 16px;
}
.td-summary-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.td-summary-val { font-family: var(--mono); font-size: 18px; color: var(--accent); }
.td-summary-val.green { color: var(--green); }
.td-summary-val.amber { color: var(--amber); }
.td-summary-val.red   { color: var(--red); }
</style>
<script data-cfasync="false">
if (new URLSearchParams(window.location.search).get('embedded') === '1') {
  document.documentElement.classList.add('embedded');
}
</script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="min-height:100vh;display:none;align-items:center;justify-content:center;background:var(--accent)">
  <div style="background:#fff;padding:40px;width:360px;border-top:3px solid var(--red)">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-bottom:24px"><strong style="color:var(--accent)">DEEPBLOE</strong> · TRAVEL</div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
      <label style="font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Email</label>
      <input type="email" id="l-email" placeholder="your email" style="border:1px solid var(--border-dark);padding:10px 12px;font-family:var(--sans);font-size:13px;outline:none;background:var(--bg)">
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
      <label style="font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Password</label>
      <input type="password" id="l-pass" style="border:1px solid var(--border-dark);padding:10px 12px;font-family:var(--sans);font-size:13px;outline:none;background:var(--bg)">
    </div>
    <button id="login-btn" style="width:100%;background:var(--accent);color:#fff;border:none;padding:12px;font-family:var(--mono);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer">Sign In</button>
    <div id="login-err" style="color:var(--red);font-size:11px;margin-top:10px;display:none;font-family:var(--mono)"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- Top bar -->
  <div class="td-topbar">
    <a href="#" class="td-back" id="back-btn">← Back</a>
    <div class="td-brand"><strong>DEEPBLOE</strong> · TRAVEL DESK</div>
    <div class="td-topbar-right">
      <span class="td-user" id="td-user"></span>
    </div>
  </div>

  <!-- Hero -->
  <div class="td-hero">
    <div class="td-hero-top">
      <div>
        <div class="td-artist" id="td-artist">-</div>
        <div class="td-venue-line" id="td-venue-line">-</div>
      </div>
      <div class="td-hero-stats" id="td-stats"></div>
    </div>
  </div>

  <!-- Body -->
  <div class="td-body">

    <!-- Summary cards -->
    <div class="td-summary-grid" id="td-summary"></div>

    <!-- Tabs -->
    <div class="td-tabs" id="td-tabs">
      <div class="td-tab active" data-tab="all" onclick="switchTab('all')">All <span class="td-tab-count" id="cnt-all">0</span></div>
      <div class="td-tab" data-tab="flight" onclick="switchTab('flight')">✈ Flights <span class="td-tab-count" id="cnt-flight">0</span></div>
      <div class="td-tab" data-tab="hotel" onclick="switchTab('hotel')">🏨 Hotels <span class="td-tab-count" id="cnt-hotel">0</span></div>
      <div class="td-tab" data-tab="ground_transport" onclick="switchTab('ground_transport')">🚗 Ground <span class="td-tab-count" id="cnt-ground_transport">0</span></div>
      <div class="td-tab" data-tab="train" onclick="switchTab('train')">🚆 Train <span class="td-tab-count" id="cnt-train">0</span></div>
      <div class="td-tab" data-tab="timeline" onclick="switchTab('timeline')">📅 Timeline</div>
    </div>

    <!-- Action bar -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="td-filter-info"></div>
      <div style="display:flex;gap:6px">
        <button class="td-btn primary" onclick="openAddModal('flight')">+ Flight</button>
        <button class="td-btn primary" onclick="openAddModal('hotel')">+ Hotel</button>
        <button class="td-btn primary" onclick="openAddModal('ground_transport')">+ Ground</button>
        <button class="td-btn primary" onclick="openAddModal('train')">+ Train</button>
      </div>
    </div>

    <!-- Content area -->
    <div id="td-content">
      <div class="td-empty">
        <div class="td-empty-icon">✈️</div>
        Loading travel items...
      </div>
    </div>

  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="td-modal-bg" id="modal-bg">
  <div class="td-modal">
    <div class="td-modal-hdr">
      <div class="td-modal-title" id="modal-title">Add Travel Item</div>
      <button class="td-modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="td-modal-body" id="modal-body"></div>
    <div class="td-modal-foot">
      <button class="td-btn red" id="modal-delete" style="display:none;margin-right:auto" onclick="deleteItem()">Delete</button>
      <button class="td-btn" onclick="closeModal()">Cancel</button>
      <button class="td-btn primary" id="modal-save" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script data-cfasync="false">
const SUPABASE_URL = 'https://ksnxgidklhonpsneerbu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JsOkmXlOxBWKXcraBE7gGg_qErTkqX9';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── AUTH ──
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  startApp();
}

db.auth.getSession().then(({ data: { session } }) => {
  if (session) startApp();
  else document.getElementById('login-screen').style.display = 'flex';
});

// ── HELPERS ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) {
  if (!d) return '-';
  const dt = new Date(d.length > 10 ? d : d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short' }) + ' ' +
         dt.toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
}
function fmtMoney(amount, currency='EUR') {
  const sym = {EUR:'€',USD:'$',GBP:'£',SGD:'S$',AED:'AED ',IDR:'Rp',THB:'฿'}[currency]||currency+' ';
  return sym + (amount||0).toLocaleString('nl-NL', { minimumFractionDigits: 2 });
}
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = type; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

// ── STATE ──
let bookingId = null;
let booking = null;
let allItems = [];
let currentTab = 'all';
let editingId = null;

// ── INIT ──
async function startApp() {
  const { data: { user } } = await db.auth.getUser();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('td-user').textContent = user?.email || '';

  const params = new URLSearchParams(window.location.search);
  bookingId = params.get('id');
  const from = params.get('from') || 'show';

  // Configure back button
  const backBtn = document.getElementById('back-btn');
  if (from === 'show') {
    backBtn.textContent = '← Back to Show';
    backBtn.onclick = (e) => {
      e.preventDefault();
      if (window.parent !== window) window.parent.closeShowOverlay();
      else window.location.href = 'show.html?id=' + bookingId;
    };
  } else {
    backBtn.textContent = '← Back to CRM';
    backBtn.onclick = (e) => { e.preventDefault(); window.location.href = 'crm.html'; };
  }

  if (!bookingId) { showToast('No booking ID in URL', 'error'); return; }

  // Load booking info
  const { data: b } = await db.from('bookings')
    .select('*, artists(name)')
    .eq('id', bookingId).single();

  if (!b) { showToast('Booking not found', 'error'); return; }
  booking = b;

  document.getElementById('td-artist').textContent = b.artists?.name || '-';
  document.getElementById('td-venue-line').innerHTML =
    `<strong>${esc(b.venue_name||'-')}</strong> · ${esc([b.venue_city,b.venue_country].filter(Boolean).join(', '))} · ${fmtDate(b.show_date)}`;
  document.title = `Travel · ${b.artists?.name||''} · ${b.venue_name||''} - Deepbloe`;

  await loadItems();
}

async function loadItems() {
  const { data, error } = await db.from('travel_items')
    .select('*')
    .eq('booking_id', bookingId)
    .order('departure_datetime', { ascending: true, nullsFirst: false });

  if (error) { showToast('Error loading travel items', 'error'); console.error(error); return; }
  allItems = data || [];
  renderSummary();
  renderCounts();
  renderContent();
}

// ── SUMMARY ──
function renderSummary() {
  const flights  = allItems.filter(i => i.type === 'flight');
  const hotels   = allItems.filter(i => i.type === 'hotel');
  const ground   = allItems.filter(i => i.type === 'ground_transport');
  const totalCost = allItems.reduce((s,i) => s + (i.cost || 0), 0);
  const confirmed = allItems.filter(i => i.status === 'confirmed').length;
  const pending   = allItems.filter(i => i.status === 'pending').length;

  document.getElementById('td-summary').innerHTML = `
    <div class="td-summary-card">
      <div class="td-summary-label">Total Items</div>
      <div class="td-summary-val">${allItems.length}</div>
    </div>
    <div class="td-summary-card">
      <div class="td-summary-label">Confirmed</div>
      <div class="td-summary-val green">${confirmed}</div>
    </div>
    <div class="td-summary-card">
      <div class="td-summary-label">Pending</div>
      <div class="td-summary-val ${pending > 0 ? 'amber' : ''}">${pending}</div>
    </div>
    <div class="td-summary-card">
      <div class="td-summary-label">Total Cost</div>
      <div class="td-summary-val">${fmtMoney(totalCost, booking?.fee_currency || 'EUR')}</div>
    </div>
  `;

  // Hero stats
  document.getElementById('td-stats').innerHTML = `
    <div class="td-stat"><div class="td-stat-num">${flights.length}</div><div class="td-stat-label">Flights</div></div>
    <div class="td-stat"><div class="td-stat-num">${hotels.length}</div><div class="td-stat-label">Hotels</div></div>
    <div class="td-stat"><div class="td-stat-num">${ground.length}</div><div class="td-stat-label">Ground</div></div>
  `;
}

function renderCounts() {
  document.getElementById('cnt-all').textContent = allItems.length;
  ['flight','hotel','ground_transport','train'].forEach(t => {
    document.getElementById('cnt-' + t).textContent = allItems.filter(i => i.type === t).length;
  });
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.td-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderContent();
}

// ── RENDER CONTENT ──
function renderContent() {
  const container = document.getElementById('td-content');

  if (currentTab === 'timeline') {
    renderTimeline(container);
    return;
  }

  const items = currentTab === 'all' ? allItems : allItems.filter(i => i.type === currentTab);

  if (!items.length) {
    container.innerHTML = `<div class="td-empty">
      <div class="td-empty-icon">${currentTab === 'flight' ? '✈️' : currentTab === 'hotel' ? '🏨' : currentTab === 'ground_transport' ? '🚗' : currentTab === 'train' ? '🚆' : '📦'}</div>
      No ${currentTab === 'all' ? 'travel items' : currentTab.replace('_',' ') + 's'} yet
    </div>`;
    return;
  }

  const icons = { flight: '✈️', hotel: '🏨', ground_transport: '🚗', train: '🚆' };
  const badgeCls = { pending: 'ti-badge-pending', booked: 'ti-badge-booked', confirmed: 'ti-badge-confirmed', cancelled: 'ti-badge-cancelled' };

  const header = `<div class="ti-row ti-row-hdr">
    <div></div><div>Details</div><div>Date / Time</div><div>Status</div><div>PNR / Ref</div><div>Cost</div><div></div>
  </div>`;

  const rows = items.map(i => {
    let title = '', sub = '';
    if (i.type === 'flight') {
      title = [i.departure_airport, i.arrival_airport].filter(Boolean).join(' → ') || 'Flight';
      sub = [i.airline, i.flight_number].filter(Boolean).join(' · ');
    } else if (i.type === 'hotel') {
      title = i.hotel_name || 'Hotel';
      sub = [i.room_type, i.check_in && i.check_out ? fmtDate(i.check_in) + ' – ' + fmtDate(i.check_out) : ''].filter(Boolean).join(' · ');
    } else if (i.type === 'ground_transport') {
      title = (i.transport_type || 'Transport').charAt(0).toUpperCase() + (i.transport_type || 'transport').slice(1);
      sub = [i.pickup_location, i.dropoff_location].filter(Boolean).join(' → ');
    } else if (i.type === 'train') {
      title = [i.departure_airport, i.arrival_airport].filter(Boolean).join(' → ') || 'Train';
      sub = i.notes || '';
    }

    const dateStr = i.type === 'hotel'
      ? (i.check_in ? fmtDate(i.check_in) : '-')
      : (i.departure_datetime ? fmtDateTime(i.departure_datetime) : '-');

    const cur = i.currency || 'EUR';

    return `<div class="ti-row" onclick="openEditModal('${i.id}')" style="cursor:pointer">
      <div class="ti-icon">${icons[i.type]||'📦'}</div>
      <div class="ti-main">
        <div class="ti-title">${esc(title)}</div>
        <div class="ti-sub">${esc(sub)}</div>
      </div>
      <div class="ti-date">${dateStr}</div>
      <div><span class="ti-badge ${badgeCls[i.status]||'ti-badge-pending'}">${esc(i.status||'pending')}</span></div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--muted)">${esc(i.pnr||i.confirmation_number||'-')}</div>
      <div class="ti-cost">${i.cost ? fmtMoney(i.cost, cur) : '-'}</div>
      <div></div>
    </div>`;
  }).join('');

  container.innerHTML = header + rows;
}

// ── TIMELINE VIEW ──
function renderTimeline(container) {
  const sorted = [...allItems].sort((a,b) => {
    const da = a.departure_datetime || a.check_in || a.pickup_datetime || '';
    const db2 = b.departure_datetime || b.check_in || b.pickup_datetime || '';
    return da.localeCompare(db2);
  });

  if (!sorted.length) {
    container.innerHTML = `<div class="td-empty"><div class="td-empty-icon">📅</div>No travel items to show on timeline</div>`;
    return;
  }

  const icons = { flight:'✈️', hotel:'🏨', ground_transport:'🚗', train:'🚆' };

  // Group by date
  const groups = {};
  sorted.forEach(i => {
    const dt = i.departure_datetime || i.check_in || i.pickup_datetime || '';
    const day = dt ? dt.slice(0, 10) : 'unscheduled';
    if (!groups[day]) groups[day] = [];
    groups[day].push(i);
  });

  let html = '';
  Object.keys(groups).sort().forEach(day => {
    const label = day === 'unscheduled' ? 'Unscheduled' : fmtDate(day);
    html += `<div class="tl-day"><div class="tl-day-header">${label}</div>`;
    groups[day].forEach(i => {
      const time = i.departure_datetime ? new Date(i.departure_datetime).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' }) :
                   i.pickup_datetime ? new Date(i.pickup_datetime).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' }) : '';
      let title = '', sub = '';
      if (i.type === 'flight') {
        title = [i.departure_airport, i.arrival_airport].filter(Boolean).join(' → ');
        sub = [i.airline, i.flight_number].filter(Boolean).join(' · ');
      } else if (i.type === 'hotel') {
        title = 'Check-in: ' + (i.hotel_name || '');
        sub = i.room_type || '';
      } else if (i.type === 'ground_transport') {
        title = [i.pickup_location, i.dropoff_location].filter(Boolean).join(' → ');
        sub = i.transport_type || '';
      } else if (i.type === 'train') {
        title = [i.departure_airport, i.arrival_airport].filter(Boolean).join(' → ');
        sub = '';
      }
      html += `<div class="tl-item" onclick="openEditModal('${i.id}')" style="cursor:pointer">
        <div class="tl-time">${time || '—'}</div>
        <div class="tl-content">
          <div class="tl-content-title">${icons[i.type]||''} ${esc(title||i.type)}</div>
          <div class="tl-content-sub">${esc(sub)} ${i.pnr ? '· PNR: '+esc(i.pnr) : ''}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

// ── MODAL ──
function getFormHTML(type, item) {
  const v = item || {};
  const statusOpts = ['pending','booked','confirmed','cancelled'].map(s =>
    `<option value="${s}" ${v.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('');

  let fields = '';

  if (type === 'flight') {
    fields = `
      <div class="td-field"><label class="td-label">Airline</label><input class="td-input" id="f-airline" value="${esc(v.airline||'')}"></div>
      <div class="td-field"><label class="td-label">Flight Number</label><input class="td-input" id="f-flight_number" value="${esc(v.flight_number||'')}"></div>
      <div class="td-field"><label class="td-label">Departure Airport</label><input class="td-input" id="f-departure_airport" value="${esc(v.departure_airport||'')}" placeholder="e.g. AMS"></div>
      <div class="td-field"><label class="td-label">Arrival Airport</label><input class="td-input" id="f-arrival_airport" value="${esc(v.arrival_airport||'')}" placeholder="e.g. JFK"></div>
      <div class="td-field"><label class="td-label">Departure</label><input type="datetime-local" class="td-input" id="f-departure_datetime" value="${v.departure_datetime ? v.departure_datetime.slice(0,16) : ''}"></div>
      <div class="td-field"><label class="td-label">Arrival</label><input type="datetime-local" class="td-input" id="f-arrival_datetime" value="${v.arrival_datetime ? v.arrival_datetime.slice(0,16) : ''}"></div>
    `;
  } else if (type === 'hotel') {
    fields = `
      <div class="td-field td-form-wide"><label class="td-label">Hotel Name</label><input class="td-input" id="f-hotel_name" value="${esc(v.hotel_name||'')}"></div>
      <div class="td-field"><label class="td-label">Check-in</label><input type="date" class="td-input" id="f-check_in" value="${v.check_in||''}"></div>
      <div class="td-field"><label class="td-label">Check-out</label><input type="date" class="td-input" id="f-check_out" value="${v.check_out||''}"></div>
      <div class="td-field"><label class="td-label">Room Type</label><input class="td-input" id="f-room_type" value="${esc(v.room_type||'')}" placeholder="e.g. Double, Suite"></div>
      <div class="td-field"><label class="td-label">Confirmation #</label><input class="td-input" id="f-confirmation_number" value="${esc(v.confirmation_number||'')}"></div>
    `;
  } else if (type === 'ground_transport') {
    fields = `
      <div class="td-field"><label class="td-label">Transport Type</label>
        <select class="td-input" id="f-transport_type">
          ${['car','van','taxi','shuttle','bus','limousine'].map(t => `<option value="${t}" ${v.transport_type===t?'selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
        </select>
      </div>
      <div class="td-field"><label class="td-label">Pickup Date/Time</label><input type="datetime-local" class="td-input" id="f-pickup_datetime" value="${v.pickup_datetime ? v.pickup_datetime.slice(0,16) : ''}"></div>
      <div class="td-field"><label class="td-label">Pickup Location</label><input class="td-input" id="f-pickup_location" value="${esc(v.pickup_location||'')}"></div>
      <div class="td-field"><label class="td-label">Drop-off Location</label><input class="td-input" id="f-dropoff_location" value="${esc(v.dropoff_location||'')}"></div>
    `;
  } else if (type === 'train') {
    fields = `
      <div class="td-field"><label class="td-label">From Station</label><input class="td-input" id="f-departure_airport" value="${esc(v.departure_airport||'')}" placeholder="e.g. Amsterdam Centraal"></div>
      <div class="td-field"><label class="td-label">To Station</label><input class="td-input" id="f-arrival_airport" value="${esc(v.arrival_airport||'')}" placeholder="e.g. Berlin Hbf"></div>
      <div class="td-field"><label class="td-label">Departure</label><input type="datetime-local" class="td-input" id="f-departure_datetime" value="${v.departure_datetime ? v.departure_datetime.slice(0,16) : ''}"></div>
      <div class="td-field"><label class="td-label">Arrival</label><input type="datetime-local" class="td-input" id="f-arrival_datetime" value="${v.arrival_datetime ? v.arrival_datetime.slice(0,16) : ''}"></div>
    `;
  }

  return `
    <input type="hidden" id="f-type" value="${type}">
    <div class="td-form-grid">
      ${fields}
      <div class="td-field"><label class="td-label">Status</label><select class="td-input" id="f-status">${statusOpts}</select></div>
      <div class="td-field"><label class="td-label">PNR / Booking Ref</label><input class="td-input" id="f-pnr" value="${esc(v.pnr||'')}"></div>
      <div class="td-field"><label class="td-label">Cost</label><input type="number" step="0.01" class="td-input" id="f-cost" value="${v.cost||''}"></div>
      <div class="td-field"><label class="td-label">Currency</label>
        <select class="td-input" id="f-currency">
          ${['EUR','USD','GBP','SGD','AED','IDR','THB'].map(c => `<option value="${c}" ${(v.currency||'EUR')===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="td-field"><label class="td-label">Booked By</label><input class="td-input" id="f-booked_by" value="${esc(v.booked_by||'')}"></div>
      <div class="td-field td-form-wide"><label class="td-label">Notes</label><textarea class="td-input" id="f-notes">${esc(v.notes||'')}</textarea></div>
    </div>
  `;
}

function openAddModal(type) {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add ' + type.replace('_',' ').replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById('modal-body').innerHTML = getFormHTML(type, {});
  document.getElementById('modal-delete').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
}

function openEditModal(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit ' + item.type.replace('_',' ').replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById('modal-body').innerHTML = getFormHTML(item.type, item);
  document.getElementById('modal-delete').style.display = 'block';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  editingId = null;
}

async function saveItem() {
  const type = document.getElementById('f-type').value;
  const row = {
    booking_id: bookingId,
    artist_id: booking?.artist_id || null,
    type: type,
    status: document.getElementById('f-status').value,
    pnr: document.getElementById('f-pnr')?.value || null,
    cost: parseFloat(document.getElementById('f-cost')?.value) || null,
    currency: document.getElementById('f-currency')?.value || 'EUR',
    booked_by: document.getElementById('f-booked_by')?.value || null,
    notes: document.getElementById('f-notes')?.value || null,
  };

  // Type-specific fields
  if (type === 'flight' || type === 'train') {
    row.departure_airport = document.getElementById('f-departure_airport')?.value || null;
    row.arrival_airport   = document.getElementById('f-arrival_airport')?.value || null;
    row.departure_datetime = document.getElementById('f-departure_datetime')?.value || null;
    row.arrival_datetime   = document.getElementById('f-arrival_datetime')?.value || null;
    if (type === 'flight') {
      row.airline       = document.getElementById('f-airline')?.value || null;
      row.flight_number = document.getElementById('f-flight_number')?.value || null;
    }
  } else if (type === 'hotel') {
    row.hotel_name          = document.getElementById('f-hotel_name')?.value || null;
    row.check_in            = document.getElementById('f-check_in')?.value || null;
    row.check_out           = document.getElementById('f-check_out')?.value || null;
    row.room_type           = document.getElementById('f-room_type')?.value || null;
    row.confirmation_number = document.getElementById('f-confirmation_number')?.value || null;
  } else if (type === 'ground_transport') {
    row.transport_type  = document.getElementById('f-transport_type')?.value || null;
    row.pickup_location = document.getElementById('f-pickup_location')?.value || null;
    row.pickup_datetime = document.getElementById('f-pickup_datetime')?.value || null;
    row.dropoff_location = document.getElementById('f-dropoff_location')?.value || null;
  }

  let error;
  if (editingId) {
    ({ error } = await db.from('travel_items').update(row).eq('id', editingId));
  } else {
    ({ error } = await db.from('travel_items').insert(row));
  }

  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast(editingId ? 'Travel item updated' : 'Travel item added', 'success');
  closeModal();
  await loadItems();
}

async function deleteItem() {
  if (!editingId) return;
  if (!confirm('Delete this travel item?')) return;
  const { error } = await db.from('travel_items').delete().eq('id', editingId);
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  showToast('Travel item deleted', 'success');
  closeModal();
  await loadItems();
}

// Close modal on bg click
document.getElementById('modal-bg').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});
</script>
