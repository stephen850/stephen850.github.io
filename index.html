<!-- ═══════════════════════════════════════════════
     DEEPBLOE — SHADER HERO v2
     - hero.jpg foto blijft als achtergrond
     - WebGL shader als semi-transparante overlay
     - Alle headline tekst volledig wit (geen opacity-dim op PLATFORM)
     - Drop-in vervanging voor <section class="hero"> ... </section>
════════════════════════════════════════════════ -->

<section class="hero" style="position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-bottom:80px;padding-top:120px;overflow:hidden;">

  <!-- 1. Hero foto (origineel, ongewijzigd) -->
  <div class="hero-bg">
    <img alt="Hero" src="hero.jpg" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 25%;filter:brightness(0.8) saturate(0.95);"/>
  </div>

  <!-- 2. Shader canvas als overlay boven de foto -->
  <canvas id="deepbloe-hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;display:block;mix-blend-mode:screen;opacity:0.55;touch-action:none;z-index:1;"></canvas>

  <!-- 3. Gradient fade naar void onderaan -->
  <div style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(8,8,8,0.0) 0%,rgba(8,8,8,0.12) 55%,#080808 100%);z-index:2;"></div>

  <!-- 4. Hero Content -->
  <div class="container" style="position:relative;z-index:3;">
    <div class="hero-counter mono">EST. 2018, GLOBAL ELECTRONIC MUSIC PLATFORM</div>
    <h1 class="hero-headline">
      GLOBAL<br/>
      ELECTRO<span class="accent">NIC</span><br/>
      <span style="color:#FFFFFF;opacity:1;display:block;">PLATFORM</span>
    </h1>
    <div class="hero-bottom">
      <p class="hero-tagline">
        One platform. Built for the artists, brands and partners shaping electronic music worldwide.
      </p>
      <div class="hero-scroll">
        <div class="hero-scroll-line"></div>
        <span>Scroll</span>
      </div>
    </div>
  </div>

</section>

<script data-cfasync="false">
(function(){
  var canvas = document.getElementById('deepbloe-hero-canvas');
  if (!canvas) return;

  var gl = canvas.getContext('webgl2');
  if (!gl) return;

  var vertSrc = [
    '#version 300 es',
    'precision highp float;',
    'in vec4 position;',
    'void main(){gl_Position=position;}'
  ].join('\n');

  var fragSrc = [
    '#version 300 es',
    'precision highp float;',
    'out vec4 O;',
    'uniform vec2 resolution;',
    'uniform float time;',
    'uniform vec2 touch;',
    '#define FC gl_FragCoord.xy',
    '#define T time',
    '#define R resolution',
    '#define MN min(R.x,R.y)',

    'float rnd(vec2 p){p=fract(p*vec2(12.9898,78.233));p+=dot(p,p+34.56);return fract(p.x*p.y);}',
    'float noise(in vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);float a=rnd(i),b=rnd(i+vec2(1,0)),c=rnd(i+vec2(0,1)),d=rnd(i+1.);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}',
    'float fbm(vec2 p){float t=.0,a=1.;mat2 m=mat2(1.,-.5,.2,1.2);for(int i=0;i<5;i++){t+=a*noise(p);p*=2.*m;a*=.5;}return t;}',
    'float clouds(vec2 p){float d=1.,t=.0;for(float i=.0;i<3.;i++){float a=d*fbm(i*10.+p.x*.2+.2*(1.+i)*p.y+d+i*i+p);t=mix(t,d,a);d=a;p*=2./(i+1.);}return t;}',

    'void main(void){',
    '  vec2 uv=(FC-.5*R)/MN, st=uv*vec2(2.,1.);',

    '  vec3 electric = vec3(0.161,0.671,0.886);',
    '  vec3 midnight = vec3(0.039,0.055,0.102);',
    '  vec3 cyan     = vec3(0.04,0.82,0.96);',
    '  vec3 marine   = vec3(0.008,0.220,0.420);',

    '  float bg = clouds(vec2(st.x+T*.35,-st.y));',
    '  uv *= 1.-.25*(sin(T*.18)*.5+.5);',

    '  vec3 col = vec3(0.0);',

    '  for(float i=1.;i<12.;i++){',
    '    uv += .09*cos(i*vec2(.08+.008*i,.75)+i*i+T*.42+.08*uv.x);',
    '    vec2 p = uv;',
    '    float d = length(p);',
    '    float hue = fract(i*.13+T*.04);',
    '    vec3 filament = mix(mix(electric,cyan,hue),mix(marine,midnight,hue),smoothstep(.0,.8,d));',
    '    col += .0015/d*filament;',
    '    float b = noise(i+p+bg*1.731);',
    '    col += .0025*b/length(max(p,vec2(b*p.x*.02,p.y)))*electric;',
    '    col = mix(col, midnight*bg*.5+marine*bg*.12, d*.3);',
    '  }',

    '  float centre = 1.0-smoothstep(.0,.5,length(uv));',
    '  col += centre*electric*.05;',

    /* Geen zwarte achtergrond -- transparant zodat foto doorschijnt via mix-blend-mode:screen */
    '  O = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function mkS(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.warn('Shader:', gl.getShaderInfoLog(s));
    }
    return s;
  }

  var vs = mkS(gl.VERTEX_SHADER, vertSrc);
  var fs = mkS(gl.FRAGMENT_SHADER, fragSrc);
  var prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
  var posLoc = gl.getAttribLocation(prog, 'position');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  var uRes   = gl.getUniformLocation(prog, 'resolution');
  var uTime  = gl.getUniformLocation(prog, 'time');
  var uTouch = gl.getUniformLocation(prog, 'touch');
  var mouse  = [0, 0];

  function resize() {
    var dpr = Math.max(1, 0.5 * window.devicePixelRatio);
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }

  canvas.addEventListener('pointermove', function(e) {
    mouse = [e.clientX, canvas.height - e.clientY];
  });

  function loop(now) {
    gl.useProgram(prog);
    gl.uniform2f(uRes,   canvas.width, canvas.height);
    gl.uniform1f(uTime,  now * 1e-3);
    gl.uniform2f(uTouch, mouse[0], mouse[1]);
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
  }

  resize();
  window.addEventListener('resize', resize);
  loop(0);
})();
</script>
