<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password - Deepbloe CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f7f5f0;
  --accent: #1a1a1a;
  --red: #c0392b;
  --green: #1a6b3c;
  --muted: #8a8278;
  --border-dark: #c8c2b8;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--accent); color: #1a1a1a; font-family: var(--sans);
  font-size: 13px; min-height: 100vh;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.logo {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.4em;
  color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 40px;
}
.logo strong { color: #fff; }
.box {
  background: #fff; padding: 40px; width: 400px; max-width: 90vw;
  border-top: 3px solid var(--green);
}
.box h1 { font-size: 20px; font-weight: 400; margin-bottom: 8px; }
.box p { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.field label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.field input {
  border: 1px solid var(--border-dark); padding: 10px 12px;
  font-family: var(--sans); font-size: 13px; outline: none; background: var(--bg);
}
.field input:focus { border-color: var(--accent); background: #fff; }
.submit-btn {
  width: 100%; background: var(--accent); color: #fff; border: none;
  padding: 12px; font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
  margin-top: 8px; transition: background 0.15s;
}
.submit-btn:hover { background: #333; }
.submit-btn:disabled { background: #999; cursor: not-allowed; }
.msg {
  font-family: var(--mono); font-size: 11px; margin-top: 12px; display: none;
}
.msg.error { color: var(--red); display: block; }
.msg.success { color: var(--green); display: block; }
.done { text-align: center; }
.done h1 { margin-bottom: 16px; }
.done a {
  display: inline-block; margin-top: 20px; background: var(--accent); color: #fff;
  padding: 12px 32px; font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none;
  transition: background 0.15s;
}
.done a:hover { background: #333; }
</style>
</head>
<body>

<div class="logo"><strong>DEEPBLOE</strong> AGENCY &middot; CRM</div>

<div class="box" id="form-box">
  <h1>Set Your Password</h1>
  <p>Create a password to access the Deepbloe CRM.</p>
  <div class="field">
    <label>New Password</label>
    <input type="password" id="pw1" placeholder="Minimum 8 characters">
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="pw2" placeholder="Repeat password">
  </div>
  <button class="submit-btn" id="submit-btn" onclick="setPassword()">Set Password</button>
  <div class="msg" id="msg"></div>
</div>

<div class="box done" id="done-box" style="display:none">
  <h1>Password Set</h1>
  <p>Your account is ready. You can now log in to the CRM.</p>
  <a href="crm.html">Go to CRM</a>
</div>

<div class="box" id="error-box" style="display:none">
  <h1>Invalid or Expired Link</h1>
  <p>This invite link is no longer valid. Please ask the agency owner to send a new invite.</p>
</div>

<script data-cfasync="false">
const SUPABASE_URL = 'https://ksnxgidklhonpsneerbu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_JsOkmXlOxBWKXcraBE7gGg_qErTkqX9';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// On page load: check if we have a valid session from the invite link
async function init() {
  // Supabase processes the hash fragment automatically on page load
  const { data: { session }, error } = await db.auth.getSession();

  if (!session) {
    // No valid session - show error
    document.getElementById('form-box').style.display = 'none';
    document.getElementById('error-box').style.display = 'block';
    return;
  }

  // Valid session - show password form
  document.getElementById('form-box').style.display = 'block';
}

async function setPassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');

  msg.className = 'msg';
  msg.style.display = 'none';

  if (!pw1 || pw1.length < 8) {
    msg.textContent = 'Password must be at least 8 characters.';
    msg.className = 'msg error';
    return;
  }
  if (pw1 !== pw2) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Setting password...';

  const { error } = await db.auth.updateUser({ password: pw1 });

  if (error) {
    msg.textContent = 'Error: ' + error.message;
    msg.className = 'msg error';
    btn.disabled = false;
    btn.textContent = 'Set Password';
    return;
  }

  // Success
  document.getElementById('form-box').style.display = 'none';
  document.getElementById('done-box').style.display = 'block';
}

// Allow Enter key to submit
document.getElementById('pw2').addEventListener('keydown', e => {
  if (e.key === 'Enter') setPassword();
});

init();
</script>
</body>
</html>
